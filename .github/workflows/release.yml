name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Check out pushed tag
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "Release tag must start with v (received: $RELEASE_TAG)"
            exit 1
          fi

          tag_version="${RELEASE_TAG#v}"
          npm version "$tag_version" --no-git-tag-version
          echo "Publishing package version $(node -p "require('./package.json').version")"

      - name: Install dependencies
        run: npm ci

      - name: Validate lecture content
        run: npm run validate

      - name: Run release checks
        run: npm run release:check

      - name: Publish package with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
